name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    name: Create Release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ inputs.release_type }}" in
            major) NEW="$((MAJOR + 1)).0.0" ;;
            minor) NEW="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) NEW="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$NEW';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Generate changelog entry
        id: changelog
        env:
          NEW_VERSION: ${{ steps.version.outputs.new }}
        run: |
          DATE=$(date +%Y-%m-%d)

          # Find the commit that bumped package.json version TO the current version
          CURRENT=${{ steps.version.outputs.current }}
          LAST_RELEASE_COMMIT=$(git log --pretty=format:"%H" -- package.json | while read sha; do
            PARENT=$(git rev-parse "${sha}^" 2>/dev/null) || continue
            CURR_VER=$(git show "${sha}:package.json" | node -e "process.stdin.resume();let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).version))" 2>/dev/null)
            PREV_VER=$(git show "${PARENT}:package.json" 2>/dev/null | node -e "process.stdin.resume();let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).version))" 2>/dev/null)
            if [ "$CURR_VER" = "$CURRENT" ] && [ "$PREV_VER" != "$CURRENT" ]; then
              echo "$sha"
              break
            fi
          done)

          if [ -n "$LAST_RELEASE_COMMIT" ]; then
            COMMITS=$(git log "${LAST_RELEASE_COMMIT}..HEAD" --pretty=format:"- %s" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges)
          fi

          if [ -z "$COMMITS" ]; then
            COMMITS="- No notable changes"
          fi

          ENTRY="## [${NEW_VERSION}] - ${DATE}"$'\n\n'"${COMMITS}"

          # Prepend entry to CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            # Insert after the first line (the "# Changelog" heading)
            HEADING=$(head -n 1 CHANGELOG.md)
            REST=$(tail -n +2 CHANGELOG.md)
            printf '%s\n\n%s\n%s\n' "$HEADING" "$ENTRY" "$REST" > CHANGELOG.md
          else
            printf '# Changelog\n\n%s\n' "$ENTRY" > CHANGELOG.md
          fi

          # Save multiline entry for PR body
          {
            echo "entry<<__EOF__"
            echo "$ENTRY"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Create branch, commit, and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.version.outputs.new }}
          CHANGELOG_ENTRY: ${{ steps.changelog.outputs.entry }}
        run: |
          BRANCH="release/v${NEW_VERSION}"

          git checkout -b "$BRANCH"
          git add package.json CHANGELOG.md
          git commit -m "chore: release v${NEW_VERSION}"
          git push --force origin "$BRANCH"

          gh pr create \
            --title "chore: release v${NEW_VERSION}" \
            --body "$(printf '## Release v%s\n\n%s\n\n---\n_This PR was automatically generated by the release workflow._' "$NEW_VERSION" "$CHANGELOG_ENTRY")" \
            --base main \
            --head "$BRANCH"
